# Documentation sources to mirror
#
# Each source defines an upstream GitHub repo and the docs path(s) within it.
# The fetcher sparse-checkouts those paths and copies them into docs/<name>/.
#
# Fields:
#   name      : output directory under docs/
#   repo      : <owner>/<repo>
#   ref       : branch or tag to sync from
#   paths     : list of upstream paths to mirror (directories or single files)
#   strip     : (optional) prefix to strip from upstream paths when placing into docs/<name>/
#   include  : (optional) glob patterns to include (default: *.md, *.mdx)
#   exclude  : (optional) glob patterns to exclude
#   homepage  : (optional) the original docs site URL, recorded in manifest
#   build     : (optional) static site build instructions for gh-pages deployment
#     tool       : bun | pnpm | pip
#     working_dir: path within repo to run the build script from
#     install    : dependency install command (always runs from repo root)
#     pre_build  : (optional) list of shell commands run from working_dir before script
#                  (used to patch upstream configs into static / correct-base builds)
#     script     : build command (runs from working_dir)
#     output     : built static files dir (relative to working_dir)
#                  contents of this dir are copied to gh-pages /<name>/
#     landing    : (optional) sub-path under /<name>/ holding the entry index.html;
#                  triggers an auto-generated redirect at /<name>/index.html

sources:
  - name: opencode
    repo: sst/opencode
    ref: dev
    homepage: https://opencode.ai/docs/
    paths:
      - packages/web/src/content/docs
    strip: packages/web/src/content/docs
    include:
      - "*.md"
      - "*.mdx"
    exclude:
      # skip non-English locale subdirectories
      - "ar/**"
      - "bs/**"
      - "da/**"
      - "de/**"
      - "es/**"
      - "fr/**"
      - "it/**"
      - "ja/**"
      - "ko/**"
      - "nb/**"
      - "pl/**"
      - "pt-br/**"
      - "ru/**"
      - "th/**"
      - "tr/**"
      - "uk/**"
      - "zh-cn/**"
      - "zh-tw/**"
    build:
      tool: bun
      working_dir: packages/web
      install: bun install
      # Upstream ships an SSR + Cloudflare adapter config. Patch it into a
      # plain static Astro build with the gh-pages base path so assets resolve
      # under https://<user>.github.io/dochub/opencode/.
      pre_build:
        - 'sed -i ''s|^  base: "/docs",|  base: "/dochub/opencode/",|'' astro.config.mjs'
        - 'sed -i ''s|^  output: "server",|  output: "static",|'' astro.config.mjs'
        - 'sed -i ''/^  adapter: cloudflare(/,/^  }),$/d'' astro.config.mjs'
        - 'sed -i ''/^import cloudflare /d'' astro.config.mjs'
        # Remove SSR-only pages: the raw-markdown endpoint and the share viewer
        # both depend on runtime request handling, which a static build cannot
        # satisfy. Starlight's content collection still renders all docs.
        - 'rm -rf "src/pages/[...slug].md.ts" src/pages/s'
        # Cloudflare adapter previously provided the passthrough image service;
        # for a static build we need Sharp (Astro's default) to be installed.
        - 'bun add sharp'
      script: bun run build
      output: dist

  - name: bruno
    repo: usebruno/bruno-docs
    ref: main
    homepage: https://docs.usebruno.com/
    paths:
      - .
    include:
      - "**/*.md"
      - "**/*.mdx"
    exclude:
      - "node_modules/**"
      - "public/**"
      - "images/**"
      - "logo/**"
    build:
      # Upstream uses Mintlify, which has no public static-export build —
      # `mint` is cloud-hosted only. We render the mirrored .md/.mdx through
      # MkDocs Material so the docs are browsable under the gh-pages subpath.
      # Mintlify-specific MDX components (<Card>, <Tabs>, <Frame>, etc.) pass
      # through as raw HTML — they won't render the same as upstream but the
      # prose content stays readable.
      tool: pip
      working_dir: .
      install: pip install mkdocs-material
      pre_build:
        # MkDocs only picks up .md by default; rename mirrored .mdx -> .md.
        - "find . -name '*.mdx' -not -path '*/node_modules/*' -exec sh -c 'mv \"$1\" \"${1%.mdx}.md\"' _ {} \\;"
        # Strip MDX `import ... from '...';` lines that MkDocs would render literally.
        - "find . -name '*.md' -not -path '*/node_modules/*' -exec sed -i -E '/^import[[:space:]].*from[[:space:]].*;?$/d' {} +"
        # MkDocs refuses docs_dir == config dir, so stage all .md files under
        # _docs/ preserving relative paths (rsync -R = use full source path).
        - "rsync -aR --include='*/' --include='*.md' --exclude='node_modules/' --exclude='*' --prune-empty-dirs ./ _docs/"
        # Heredoc must remain the LAST entry: gen-build-matrix.py joins entries
        # with ` && `, and anything appended after the terminator line would
        # break the heredoc syntax.
        - |
          cat > mkdocs.yml <<'YAML'
          site_name: Bruno Docs (mirror)
          site_url: https://jiezhi.github.io/dochub/bruno/
          docs_dir: _docs
          site_dir: _site
          use_directory_urls: true
          theme:
            name: material
          markdown_extensions:
            - admonition
            - attr_list
            - md_in_html
            - tables
            - pymdownx.details
            - pymdownx.superfences
            - pymdownx.tabbed:
                alternate_style: true
          exclude_docs: |
            snippets/
          YAML
      script: mkdocs build
      output: _site

  - name: claude-code
    repo: ericbuess/claude-code-docs
    ref: main
    homepage: https://docs.claude.com/en/docs/claude-code/overview
    paths:
      - docs
    strip: docs
    include:
      - "*.md"
    build:
      # Anthropic ships Claude Code docs through Mintlify at docs.claude.com
      # with no public source repo; ericbuess/claude-code-docs is a community
      # mirror refreshed every ~3h. Same MkDocs Material pattern as bruno so
      # the .md files are browsable under /dochub/claude-code/. Mintlify
      # components (<Tabs>, <Note>, <CodeGroup>, etc.) pass through as raw HTML
      # — readable but won't render identically to upstream.
      tool: pip
      working_dir: .
      install: pip install mkdocs-material
      pre_build:
        # Upstream has no index.md; promote overview.md so / lands on it.
        - "mv docs/overview.md docs/index.md"
        # Heredoc must remain the LAST entry: gen-build-matrix.py joins entries
        # with ` && `, and anything appended after the terminator line would
        # break the heredoc syntax.
        - |
          cat > mkdocs.yml <<'YAML'
          site_name: Claude Code Docs (mirror)
          site_url: https://jiezhi.github.io/dochub/claude-code/
          docs_dir: docs
          site_dir: _site
          use_directory_urls: true
          theme:
            name: material
          markdown_extensions:
            - admonition
            - attr_list
            - md_in_html
            - tables
            - pymdownx.details
            - pymdownx.superfences
            - pymdownx.tabbed:
                alternate_style: true
          YAML
      script: mkdocs build
      output: _site

  - name: fastmcp
    repo: jlowin/fastmcp
    ref: main
    homepage: https://gofastmcp.com/
    paths:
      - docs
    strip: docs
    include:
      - "**/*.md"
      - "**/*.mdx"
    exclude:
      - "assets/**"
      - "public/**"
      - "css/**"
      - ".cursor/**"
      - "snippets/**"
    build:
      # Upstream uses Mintlify (gofastmcp.com) with no public static-export
      # build. Same MkDocs Material pattern as bruno / claude-code so the
      # mirrored .md/.mdx are browsable under /dochub/fastmcp/. Mintlify
      # components (<Card>, <Tabs>, <CodeGroup>, etc.) pass through as raw
      # HTML — readable but won't render identically to upstream.
      tool: pip
      working_dir: .
      install: pip install mkdocs-material
      pre_build:
        # MkDocs only picks up .md by default; rename mirrored .mdx -> .md.
        - "find docs -name '*.mdx' -exec sh -c 'mv \"$1\" \"${1%.mdx}.md\"' _ {} \\;"
        # Strip MDX `import ... from '...';` lines that MkDocs would render literally.
        - "find docs -name '*.md' -exec sed -i -E '/^import[[:space:]].*from[[:space:]].*;?$/d' {} +"
        # Mintlify frontmatter uses FontAwesome icon names (hand-wave, toolbox,
        # etc.) that Material for MkDocs treats as Material Design icons and
        # fails to resolve. Drop `icon:` lines from frontmatter.
        - "find docs -name '*.md' -exec sed -i -E '/^icon:[[:space:]]/d' {} +"
        # Upstream has no docs/index.md; promote welcome.md so / lands on it.
        - "mv docs/getting-started/welcome.md docs/index.md"
        # Heredoc must remain the LAST entry: gen-build-matrix.py joins entries
        # with ` && `, and anything appended after the terminator line would
        # break the heredoc syntax.
        - |
          cat > mkdocs.yml <<'YAML'
          site_name: FastMCP Docs (mirror)
          site_url: https://jiezhi.github.io/dochub/fastmcp/
          docs_dir: docs
          site_dir: _site
          use_directory_urls: true
          theme:
            name: material
          markdown_extensions:
            - admonition
            - attr_list
            - md_in_html
            - tables
            - pymdownx.details
            - pymdownx.superfences
            - pymdownx.tabbed:
                alternate_style: true
          exclude_docs: |
            snippets/
          YAML
      script: mkdocs build
      output: _site

  - name: uv
    repo: astral-sh/uv
    ref: main
    homepage: https://docs.astral.sh/uv/
    paths:
      - docs
    strip: docs
    include:
      - "**/*.md"
    exclude:
      - ".overrides/**"
      - "assets/**"
      - "js/**"
      - "stylesheets/**"
    build:
      # Upstream ships its own MkDocs Material site (mkdocs.yml at repo root,
      # custom Astral palettes in docs/stylesheets/extra.css, overrides in
      # docs/.overrides/). Install the same plugin set declared in
      # `pyproject.toml [dependency-groups].docs`, then patch:
      #   - site_url → gh-pages subpath
      #   - site_dir → _site (workflow output convention)
      #   - git-revision-date-localized → fallback_to_build_date so the
      #     depth=1 clone used by build-docs.yml doesn't break the plugin
      tool: pip
      working_dir: .
      install: pip install "mkdocs>=1.5.0" "mkdocs-material>=9.1.18" "mkdocs-redirects>=1.2.2" "mkdocs-git-revision-date-localized-plugin>=1.3.0" "mkdocs-llmstxt>=0.2.0"
      pre_build:
        - "sed -i 's|^site_url: https://docs.astral.sh/uv/|site_url: https://jiezhi.github.io/dochub/uv/|' mkdocs.yml"
        - "sed -i 's|^site_dir: site/uv|site_dir: _site|' mkdocs.yml"
        - "sed -i 's|^  - git-revision-date-localized:|  - git-revision-date-localized:\\n      fallback_to_build_date: true|' mkdocs.yml"
      script: mkdocs build
      output: _site

  - name: mermaid
    repo: mermaid-js/mermaid
    ref: develop
    homepage: https://mermaid.js.org/
    paths:
      - packages/mermaid/src/docs
    strip: packages/mermaid/src/docs
    include:
      - "**/*.md"
    exclude:
      - ".vitepress/**"
      - "public/**"
      - "img/**"
    build:
      tool: pnpm
      working_dir: packages/mermaid
      install: pnpm install --frozen-lockfile
      # Upstream config uses `base: '/'` for mermaid.js.org. Rewrite to the
      # gh-pages subpath so VitePress emits assets under /dochub/mermaid/.
      # The docs.cli --vitepress step copies src/docs/.vitepress/ verbatim
      # into src/vitepress/.vitepress/, so patching the source is enough.
      pre_build:
        - "sed -i \"s|^  base: '/',|  base: '/dochub/mermaid/',|\" src/docs/.vitepress/config.ts"
      script: pnpm docs:build:vitepress
      output: src/vitepress/.vitepress/dist
