name: Build Docs

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      only:
        description: "Comma-separated source names (blank = all)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      sources: ${{ steps.gen.outputs.sources }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install pyyaml
      - id: gen
        name: Generate build matrix
        run: |
          MATRIX=$(python scripts/gen-build-matrix.py)
          if [ -n "${{ github.event.inputs.only }}" ]; then
            MATRIX=$(echo "$MATRIX" | python scripts/filter-matrix.py "${{ github.event.inputs.only }}")
          fi
          echo "sources=$(echo "$MATRIX" | jq -c .)" >> "$GITHUB_OUTPUT"

  build:
    needs: matrix
    if: fromJson(needs.matrix.outputs.sources).include[0] != null
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.sources) }}
    steps:
      - uses: actions/setup-node@v4
        with: { node-version: "22" }

      - if: matrix.tool == 'bun'
        uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3" }

      - if: matrix.tool == 'pnpm'
        uses: pnpm/action-setup@v4
        with: { version: "10" }

      - name: Clone upstream repo
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh repo clone "${{ matrix.repo }}" _src -- --depth=1 --branch "${{ matrix.ref }}"

      - name: Install dependencies
        working-directory: _src
        run: ${{ matrix.install }}

      - name: Build
        working-directory: _src/${{ matrix.working_dir }}
        run: ${{ matrix.script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-${{ matrix.name }}
          path: _src/${{ matrix.working_dir }}/${{ matrix.output }}
          retention-days: 1

  deploy:
    needs: build
    if: always() && !cancelled() && needs.build.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: built-*
          merge-multiple: true
          path: _built

      - name: Publish to gh-pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          REPO="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"

          if git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            git clone --depth=1 --branch gh-pages "$REPO" _pages
          else
            mkdir _pages
            git -C _pages init
            git -C _pages checkout -b gh-pages
          fi

          # Clear and copy built artifacts
          rm -rf _pages/*/
          for d in _built/built-*/; do
            [ -d "$d" ] || continue
            name=$(basename "$d" | sed 's/^built-//')
            mkdir -p "_pages/$name"
            cp -r "$d"* "_pages/$name/"
          done

          # Generate index page
          python scripts/gen-index.py "${{ github.repository }}" > _pages/index.html

          cd _pages
          git add -A .
          if git diff --cached --quiet; then
            echo "No changes, skipping push."
            exit 0
          fi
          git commit -m "build: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push "$REPO" gh-pages
